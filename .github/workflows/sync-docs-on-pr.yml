name: Sync Notion Docs on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    # Only run on actual merges, and skip PRs created by Devin to avoid recursive triggers
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.user.login != 'devin-ai-integration[bot]' &&
      !startsWith(github.event.pull_request.head.ref, 'devin/')
    steps:
      - name: Checkout repo for config file
        uses: actions/checkout@v4
        with:
          ref: main
          sparse-checkout: .github/notion-docs.json
          sparse-checkout-cone-mode: false
      - name: Trigger Devin session for doc sync
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO: ${{ github.repository }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |

          PROMPT=$(cat <<'PROMPT_EOF'
          A pull request was just merged into main on REPO_PLACEHOLDER:
          - PR #PR_NUM_PLACEHOLDER: "PR_TITLE_PLACEHOLDER"
          - Author: PR_AUTHOR_PLACEHOLDER
          - Branch: HEAD_REF_PLACEHOLDER -> BASE_REF_PLACEHOLDER

          ## Your Task
          Analyze the PR diff and determine whether the Notion documentation needs updating.
          The list of Notion documents to check is defined in `.github/notion-docs.json` in this repo.

          ## Step 1: Read the PR diff
          Use git_view_pr for the repo and PR number above. Identify all changed files and summarize the nature of the changes.

          ## Step 2: Classify the change
          Determine which category the PR falls into:

          | Change Type | Documentation Action |
          |-------------|---------------------|
          | Behavioral changes (new features, changed API responses, new UI) | Full doc update across PRD, TDD, and API Reference |
          | Refactors (renamed internals, no runtime impact) | Changelog entry only in API Reference. Do NOT update endpoints, schemas, or PRD |
          | Configuration changes (env vars, CORS, ports) | Update TDD config sections only. No PRD unless user-facing |
          | API changes (new/modified/removed endpoints, changed request/response) | Full API Reference update + TDD endpoint table + PRD if user-facing |
          | Customer-specific overrides (feature flags, tenant logic) | TDD only with callout noting scope |
          | Temporary workarounds (hotfixes, monkey-patches) | Changelog entry only |

          Do NOT hallucinate intent. If the purpose is unclear, post a comment on the PR:
          > "Intent unclear from PR context. Please clarify whether this change is user-facing and which documentation sections should be updated."
          Then stop.

          ## Step 3: Read the Notion docs config
          The repository contains a config file at `.github/notion-docs.json` that lists all Notion documents
          to keep in sync. Read this file from the repo (REPO_PLACEHOLDER, main branch) to discover:
          - Which documents exist (name, page_id)
          - When each document should be updated (update_when)
          - Which sections to update in each document (sections array)

          For each document in the config whose `update_when` condition matches the change classification
          from Step 2, update the relevant sections listed in that document's `sections` array.

          ## Step 4: Update Notion documents (if needed)
          Use the Notion MCP tools (notion-fetch, notion-update-page) to update the relevant documents.

          ### Formatting rules
          - Tables: always include fit-page-width="true" header-row="true" attributes
          - Callout blocks: ::: callout {icon="..." color="..."}
          - Use notion-fetch with parameter "id" (NOT "page_id") to read pages
          - Use notion-update-page with "page_id" parameter to write
          - selection_with_ellipsis must uniquely identify location (~20+ chars start...end)
          - If >200 lines, break into multiple smaller insertions

          ### Guardrails
          1. Only modify relevant sections
          2. Never rewrite the entire page
          3. Never remove content unless explicitly deleted in code
          4. Avoid duplication — fetch first, confirm content doesn't already exist
          5. Preserve formatting and headers exactly

          ## Step 5: Post a summary comment on the PR
          After completing (or determining no update is needed), post a comment on the PR:

          If docs were updated:
          ```
          ## Notion Documentation Sync

          **Change classification**: [type]

          **Documents updated**:
          - [For each document in notion-docs.json: name + sections updated or "no change"]

          **Summary**: [brief description of what was added/changed]
          ```

          If no update needed:
          ```
          ## Notion Documentation Sync

          **Change classification**: [type] (no doc update required)

          No Notion documentation changes needed for this PR.
          ```

          ## Forbidden Actions
          - Do NOT rewrite entire Notion pages
          - Do NOT remove existing docs unless corresponding code was deleted
          - Do NOT create new Notion pages — only update the ones listed in .github/notion-docs.json
          - Do NOT make any code changes — this is documentation-only
          PROMPT_EOF

          # Substitute placeholders (all values come from env vars, not direct ${{ }} interpolation)
          PROMPT="${PROMPT//REPO_PLACEHOLDER/$REPO}"
          PROMPT="${PROMPT//PR_NUM_PLACEHOLDER/$PR_NUMBER}"
          PROMPT="${PROMPT//PR_TITLE_PLACEHOLDER/$PR_TITLE}"
          PROMPT="${PROMPT//PR_AUTHOR_PLACEHOLDER/$PR_AUTHOR}"
          PROMPT="${PROMPT//HEAD_REF_PLACEHOLDER/$HEAD_REF}"
          PROMPT="${PROMPT//BASE_REF_PLACEHOLDER/$BASE_REF}"

          echo "Triggering Devin session for PR #${PR_NUMBER}..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.devin.ai/v3/organizations/sessions" \
            -H "Authorization: Bearer ${DEVIN_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg prompt "$PROMPT" '{prompt: $prompt}')")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            SESSION_ID=$(echo "$BODY" | jq -r '.session_id // .id // "unknown"')
            SESSION_URL=$(echo "$BODY" | jq -r '.url // "unknown"')
            echo "Devin session created successfully!"
            echo "Session ID: ${SESSION_ID}"
            echo "Session URL: ${SESSION_URL}"
          else
            echo "Failed to create Devin session (HTTP ${HTTP_CODE})"
            echo "Response: ${BODY}"
            exit 1
          fi
