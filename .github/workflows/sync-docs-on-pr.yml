name: Sync Notion Docs on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    # Only run on actual merges, and skip PRs created by Devin to avoid recursive triggers
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.user.login != 'devin-ai-integration[bot]' &&
      !startsWith(github.event.pull_request.head.ref, 'devin/')
    steps:
      - name: Trigger Devin session for doc sync
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO: ${{ github.repository }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |

          PROMPT=$(cat <<'PROMPT_EOF'
          A pull request was just merged into main on REPO_PLACEHOLDER:
          - PR #PR_NUM_PLACEHOLDER: "PR_TITLE_PLACEHOLDER"
          - Author: PR_AUTHOR_PLACEHOLDER
          - Branch: HEAD_REF_PLACEHOLDER -> BASE_REF_PLACEHOLDER

          ## Your Task
          Analyze the merged PR and determine whether any Notion documentation needs updating.
          You will dynamically discover relevant Notion docs and Slack context — nothing is hardcoded.

          ## Step 1: Read the PR diff and comments
          Use git_view_pr for the repo and PR number above. Read:
          - The full diff (all changed files)
          - The PR description and any review comments
          - Any linked issues or ticket references
          Summarize the nature of the changes.

          ## Step 2: Classify the change
          Determine which category the PR falls into:

          | Change Type | Documentation Action |
          |-------------|---------------------|
          | Behavioral changes (new features, changed API responses, new UI) | Full doc update — search for and update all relevant docs (PRDs, technical specs, API references) |
          | Refactors (renamed internals, no runtime impact) | Changelog entry only. Do NOT update feature docs, endpoints, or schemas |
          | Configuration changes (env vars, CORS, ports) | Update technical/config docs only. No PRD unless user-facing |
          | API changes (new/modified/removed endpoints, changed request/response) | Update API references + technical docs + PRD if user-facing |
          | Customer-specific overrides (feature flags, tenant logic) | Technical docs only with callout noting scope |
          | Temporary workarounds (hotfixes, monkey-patches) | Changelog entry only |

          Do NOT hallucinate intent. If the purpose is unclear, post a comment on the PR:
          > "Intent unclear from PR context. Please clarify whether this change is user-facing and which documentation sections should be updated."
          Then stop.

          ## Step 3: Gather Slack context
          Search Slack for discussions related to this PR. Use keywords from:
          - The PR title and branch name
          - Any ticket/issue IDs referenced in the PR (e.g., PROJ-123, #42)
          - Feature names or component names mentioned in the diff

          Look for:
          - Why the change was made (customer requests, bug reports, product decisions)
          - Any additional context about expected behavior or scope
          - Stakeholder discussions that clarify intent

          This Slack context should enrich the documentation updates, especially for PRDs
          where customer-facing rationale matters.

          ## Step 4: Discover relevant Notion documents
          Use the Notion MCP search tool (notion-search) to find all documentation pages
          related to this repository and the changes in this PR. Search for:
          - The project/product name (e.g., "marketplace", "ShopHub")
          - Document types: "PRD", "technical design", "API reference", "TDD", "spec"
          - Feature-specific terms from the PR diff

          For each document found, use notion-fetch to read its current content and determine
          whether it needs updating based on the change classification from Step 2.

          ## Step 5: Update relevant Notion documents
          For each Notion document that needs updating, use notion-update-page to make
          targeted updates. Follow these rules:

          ### What to update based on document type
          - **PRDs / Product docs**: Add new features, update functional requirements,
            include customer context gathered from Slack
          - **Technical design docs**: Update architecture sections, data models,
            file structure, component tables, endpoint summaries
          - **API references**: Add/update endpoint documentation, data schemas,
            error references, auth matrix, changelog entries
          - **Any other relevant docs**: Update sections that are affected by the code changes

          ### Formatting rules
          - Fetch the Notion enhanced markdown spec (notion://docs/enhanced-markdown-spec) before writing
          - Use notion-fetch with parameter "id" to read pages
          - Use notion-update-page with "page_id" parameter to write
          - selection_with_ellipsis must uniquely identify the target location (~20+ chars start...end)
          - If an update exceeds 200 lines, break it into multiple smaller insertions
          - Preserve the existing formatting style of each document

          ### Guardrails
          1. Only modify sections relevant to the code changes
          2. Never rewrite an entire page — make targeted, surgical edits
          3. Never remove existing content unless the corresponding code was deleted
          4. Avoid duplication — fetch the page first, confirm the content doesn't already exist
          5. Preserve all existing formatting, headers, and structure exactly
          6. Match the tone and style of the existing document

          ## Step 6: Post a summary comment on the PR
          After completing (or determining no update is needed), post a comment on the PR:

          If docs were updated:
          ```
          ## Notion Documentation Sync

          **Change classification**: [type]

          **Slack context**: [brief summary of relevant Slack discussions found, or "none found"]

          **Documents updated**:
          - [Document name]: [sections updated]
          - [Document name]: [sections updated]
          (list all documents that were updated)

          **Summary**: [brief description of what was added/changed and why]
          ```

          If no update needed:
          ```
          ## Notion Documentation Sync

          **Change classification**: [type] (no doc update required)

          No Notion documentation changes needed for this PR.
          ```

          ## Forbidden Actions
          - Do NOT rewrite entire Notion pages
          - Do NOT remove existing documentation unless corresponding code was deleted
          - Do NOT create new Notion pages — only update existing ones you discover via search
          - Do NOT make any code changes — this is documentation-only
          - Do NOT guess or fabricate information — only document what is evidenced in the code and PR
          PROMPT_EOF

          # Substitute placeholders (all values come from env vars, not direct ${{ }} interpolation)
          PROMPT="${PROMPT//REPO_PLACEHOLDER/$REPO}"
          PROMPT="${PROMPT//PR_NUM_PLACEHOLDER/$PR_NUMBER}"
          PROMPT="${PROMPT//PR_TITLE_PLACEHOLDER/$PR_TITLE}"
          PROMPT="${PROMPT//PR_AUTHOR_PLACEHOLDER/$PR_AUTHOR}"
          PROMPT="${PROMPT//HEAD_REF_PLACEHOLDER/$HEAD_REF}"
          PROMPT="${PROMPT//BASE_REF_PLACEHOLDER/$BASE_REF}"

          echo "Triggering Devin session for PR #${PR_NUMBER}..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.devin.ai/v3/organizations/sessions" \
            -H "Authorization: Bearer ${DEVIN_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg prompt "$PROMPT" '{prompt: $prompt}')")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            SESSION_ID=$(echo "$BODY" | jq -r '.session_id // .id // "unknown"')
            SESSION_URL=$(echo "$BODY" | jq -r '.url // "unknown"')
            echo "Devin session created successfully!"
            echo "Session ID: ${SESSION_ID}"
            echo "Session URL: ${SESSION_URL}"
          else
            echo "Failed to create Devin session (HTTP ${HTTP_CODE})"
            echo "Response: ${BODY}"
            exit 1
          fi
