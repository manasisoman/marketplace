name: Sync Docs on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  classify-and-propose:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Trigger Devin for Phase 1 Classification
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          PROMPT_TEMPLATE=$(cat <<'PROMPT_EOF'
          ## Phase 1 + Conditional Phase 2: Classify and Apply Documentation Updates

          A PR has been merged to main. Your task is to classify the changes,
          propose documentation updates, and — if the changes are API endpoint
          changes — auto-apply the documentation updates to Notion.

          **PR Details:**
          - PR #__PR_NUMBER__: __PR_TITLE__
          - Author: __PR_AUTHOR__
          - Merge commit: __MERGE_SHA__

          **Instructions:**

          ### Step 1: Classify (Phase 1)
          1. Read the PR diff to understand what changed
          2. Derive the feature area by analyzing the files changed (use the
             app-architecture skill's self-derivation approach — do NOT rely on
             hardcoded mappings)
          3. Determine whether the changes are **API endpoint changes** (e.g.,
             new/modified routes, query parameters, response shapes, middleware
             in backend route files) vs. other changes (frontend/UI, customer
             experience, config, tooling, etc.)
          4. Determine which Notion page(s) need updating based on the feature area
          5. Follow the Notion Page Creation Policy defined in the
             notion-doc-sync skill to decide whether to update existing pages
             or create new ones. Use your judgment per the policy criteria.
          6. Post a classification comment on the PR with:
             - Feature area identified
             - Whether this is an API endpoint change or another type of change
             - Notion page(s) to update or create
             - Summary of proposed documentation changes
             - If recommending a new page, include the rationale

          ### Step 2: Apply or Defer (Phase 2)
          After posting the classification comment, decide the next step. A single
          PR may contain BOTH API and non-API changes — handle each type separately:

          **For API endpoint changes within the PR** (auto-apply):
          - Auto-apply ONLY the API endpoint documentation (e.g., new/modified
            routes, query parameters, response shapes, middleware, and directly
            related API Reference page updates including endpoint-specific data
            model tables).
          - For each API doc change:
            a. Fetch the current content of the target Notion page
            b. Apply the updates following doc-standards skill conventions
          - If the Notion Page Creation Policy calls for a new page, create it
            following the policy guidelines.
          - Post a follow-up comment on the PR confirming which API doc changes
            were applied, with links to the updated/created Notion pages.

          **For non-API changes within the PR** (file GitHub Issues):
          - Do NOT apply non-API documentation to Notion directly. Non-API changes
            include: PRD feature stories, functional requirements, TDD model schemas,
            TDD architecture sections, frontend component documentation, and any
            other changes that are not API endpoint documentation.
          - Instead, create GitHub Issues for the non-API documentation, grouped by
            feature area. Each Issue should contain:
            a. Title: "Doc Update — [Feature Name]: [Brief description]"
            b. The proposed Notion content (fully drafted per doc-standards templates)
            c. Target Notion page (existing page URL or "New page under [parent]")
            d. A note: "Comment `/approve-docs` to apply these changes to Notion."
          - Include a summary in the PR comment listing the GitHub Issues created
            for non-API changes.

          **If the PR contains ONLY non-API changes** (no API endpoints at all):
          - Do NOT apply any changes to Notion.
          - End the classification comment with a note:
            "Non-API change — documentation updates will be addressed in the
            next weekly batch run."
          - Stop here. The weekly-doc-batch process will pick up this PR and
            handle the documentation updates with full Slack context gathering.

          **Skills to reference:**
          - .agents/skills/notion-doc-sync/SKILL.md — for Notion page creation policy
          - .agents/skills/doc-standards/SKILL.md — for documentation formatting standards
          - .agents/skills/app-architecture/SKILL.md — for how to derive architecture
          PROMPT_EOF
          )

          PAYLOAD=$(jq -n \
            --arg template "$PROMPT_TEMPLATE" \
            --arg pr_number "$PR_NUMBER" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_author "$PR_AUTHOR" \
            --arg merge_sha "$MERGE_SHA" \
            '{prompt: ($template | gsub("__PR_NUMBER__"; $pr_number) | gsub("__PR_TITLE__"; $pr_title) | gsub("__PR_AUTHOR__"; $pr_author) | gsub("__MERGE_SHA__"; $merge_sha))}')

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.devin.ai/v1/sessions" \
            -H "Authorization: Bearer ${DEVIN_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 400 ]; then
            echo "Error triggering Devin session: HTTP $HTTP_CODE"
            echo "$BODY"
            exit 1
          fi

          SESSION_URL=$(echo "$BODY" | jq -r '.url // empty')
          echo "Devin session created: $SESSION_URL"
