name: Weekly Documentation Batch

on:
  schedule:
    # Runs every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    # Allow manual triggering for testing or catch-up runs

jobs:
  batch-doc-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed to list merged PRs

      - name: Trigger Devin for Weekly Batch
        uses: devin-ai/trigger@v1
        with:
          prompt: |
            ## Weekly Documentation Batch Process

            It's time for the weekly documentation sync. Your task is to review all
            PRs merged to main since the last batch run and propose documentation updates.

            **Instructions:**

            1. **Derive the app architecture** — Follow the app-architecture skill
               (`.agents/skills/app-architecture/SKILL.md`) to analyze the current state
               of the repository. Build a feature-to-file mapping as described in the
               weekly-doc-batch skill.

            2. **List merged PRs** — Find all PRs merged to main in the past 7 days
               (since the last weekly run). If this is a manual run, check the most
               recent batch Issue to determine the cutoff date.

            3. **Gather Slack context** — For each PR, search Slack for relevant
               discussions following the dynamic channel discovery rules in the
               weekly-doc-batch skill (`.agents/skills/weekly-doc-batch/SKILL.md`).
               Start with suggested channels, then discover additional relevant ones.

            4. **Group PRs by feature** — Using the derived feature-to-file mapping,
               group related PRs together. Follow the grouping logic in the
               weekly-doc-batch skill (max 5 PRs per group, split by backend/frontend
               if needed).

            5. **Create GitHub Issues** — For each group, create a GitHub Issue with:
               - Title: "Doc Update: [Feature Area] — Week of YYYY-MM-DD"
               - Body: PR summaries, Slack context, proposed Notion changes
               - Label: `doc-sync`
               - If recommending new Notion pages, include the callout from the
                 Notion Page Creation Policy in the notion-doc-sync skill

            6. **Apply documentation formatting** — All proposed content in the Issues
               should follow the conventions in the doc-standards skill
               (`.agents/skills/doc-standards/SKILL.md`).

            **Skills to reference:**
            - `.agents/skills/weekly-doc-batch/SKILL.md` — for Slack discovery, PR grouping, and batch process
            - `.agents/skills/app-architecture/SKILL.md` — for architecture derivation
            - `.agents/skills/notion-doc-sync/SKILL.md` — for Notion page creation policy
            - `.agents/skills/doc-standards/SKILL.md` — for documentation formatting standards
